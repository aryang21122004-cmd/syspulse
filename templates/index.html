<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysPulse Dashboard | Monitoring</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-orange: #d29922;
        }

        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0; 
        }

        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 40px; }
        h1 span { color: var(--accent-green); font-size: 0.5em; vertical-align: middle; }

        /* Animation: Fade in and slide up on load */
        @keyframes pageEntry {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animation: Pulsing red border for high-load alerts */
        @keyframes alertPulse {
            0% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); border-color: var(--accent-red); }
            70% { box-shadow: 0 0 0 10px rgba(248, 81, 73, 0); border-color: var(--accent-red); }
            100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0); border-color: var(--accent-red); }
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            width: 100%; 
            max-width: 1000px; 
            animation: pageEntry 0.8s ease-out;
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .card.warning { animation: alertPulse 2s infinite; }

        .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .value { font-size: 2.4rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        
        .bar-bg { background: #21262d; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 15px; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s ease; }

        #cpu-bar { background: var(--accent-green); }
        #ram-bar { background: var(--accent-blue); }
        #temp-bar { background: var(--accent-orange); }
    </style>
</head>
<body>

    <h1>SYSPULSE <span>● LIVE</span></h1>

    <div class="container">
        <div class="card" id="cpu-card">
            <div class="label">CPU Usage</div>
            <div id="cpu-val" class="value">0%</div>
            <div class="bar-bg"><div id="cpu-bar" class="bar-fill"></div></div>
        </div>

        <div class="card" id="ram-card">
            <div class="label">Memory Load</div>
            <div id="ram-val" class="value">0%</div>
            <div class="bar-bg"><div id="ram-bar" class="bar-fill"></div></div>
        </div>

        <div class="card" id="temp-card">
            <div class="label">Core Thermal</div>
            <div id="temp-val" class="value">--°C</div>
            <div class="bar-bg"><div id="temp-bar" class="bar-fill"></div></div>
        </div>

        <div class="card" id="fan-card">
            <div class="label">Fan Velocity</div>
            <div id="fan-val" class="value">--</div>
            <div style="font-size: 0.7rem; color: var(--text-dim); margin-top: 10px;">Hardware RPM Sensor</div>
        </div>
        
    </div>
    </div> <div class="card" style="margin-top: 20px; width: 100%; max-width: 900px; text-align: left;">
        <div class="label">Recent History (Last 5 mins)</div>
        <ul id="history-list" style="list-style: none; padding: 10px 0; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-dim); line-height: 1.6;">
            </ul>
    </div>

    <script>
        const API_KEY = "{{ api_key }}";
        // --- 1. LIVE UPDATE LOGIC ---
        function updateMetric(idPrefix, value, unit, threshold = 80) {
            const valEl = document.getElementById(idPrefix + '-val');
            const barEl = document.getElementById(idPrefix + '-bar');
            const cardEl = document.getElementById(idPrefix + '-card');

            if (value === 0 || value === null) {
                valEl.innerText = idPrefix === 'temp' ? "N/A" : (idPrefix === 'fan' ? "OFF" : "0%");
                if (barEl) barEl.style.width = "0%";
                return;
            }

            valEl.innerText = value + unit;
            if (barEl) {
                barEl.style.width = Math.min(value, 100) + "%";
                
                if (value >= threshold) {
                    barEl.style.backgroundColor = "var(--accent-red)";
                    cardEl.classList.add('warning');
                } else if (value >= 50) {
                    barEl.style.backgroundColor = "var(--accent-orange)";
                    cardEl.classList.remove('warning');
                } else {
                    barEl.style.backgroundColor = idPrefix === 'cpu' ? "var(--accent-green)" : 
                                               (idPrefix === 'ram' ? "var(--accent-blue)" : "var(--accent-orange)");
                    cardEl.classList.remove('warning');
                }
            }
        }

        function fetchMetrics() {
            fetch('/api/metrics', { headers: { "X-API-Key": API_KEY } })
                .then(res => res.json())
                .then(data => {
                    updateMetric('cpu', data.cpu, '%');
                    updateMetric('ram', data.ram, '%');
                    updateMetric('temp', data.temp, '°C', 75);
                    updateMetric('fan', data.fan, ' RPM');
                })
                .catch(err => console.error("API Link Broken:", err));
        }

        // --- 2. DATABASE HISTORY LOGIC (New for Step 8) ---
        function fetchHistory() {
            fetch('/api/history')
                .then(res => res.json())
                .then(logs => {
                    const list = document.getElementById('history-list');
                    // Maps the database rows to HTML list items
                    list.innerHTML = logs.map(log => `
                        <li style="border-bottom: 1px solid #30363d; padding: 8px 0; display: flex; justify-content: space-between;">
                            <span style="color: var(--accent-blue)">[${log[0]}]</span> 
                            <span>CPU: <strong>${log[1]}%</strong> | RAM: <strong>${log[2]}%</strong></span>
                        </li>
                    `).join('');
                })
                .catch(err => console.error("History Log Error:", err));
        }

        // --- 3. EXECUTION TIMERS ---
        // Live data updates every 2 seconds
        setInterval(fetchMetrics, 2000);
        // History updates every 30 seconds (Matching our backend worker)
        setInterval(fetchHistory, 30000);

        // Initial calls so the page populates immediately on load
        fetchMetrics();
        fetchHistory();
    </script>
